name: verify Modrinth synchronization

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: microsoft

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: cache ModMenu from flaky upstream
        env:
          MODMENU_VERSION: 18.0.0-alpha.8
        run: |
          MODULE_DIR="${HOME}/.m2/repository/com/terraformersmc/modmenu/${MODMENU_VERSION}"
          BASE_URL="https://maven.terraformersmc.com/releases/com/terraformersmc/modmenu/${MODMENU_VERSION}/modmenu-${MODMENU_VERSION}"
          mkdir -p "${MODULE_DIR}"
          for extension in jar pom module; do
            curl --fail --location --retry 10 --retry-all-errors \
              --output "${MODULE_DIR}/modmenu-${MODMENU_VERSION}.${extension}" \
              "${BASE_URL}.${extension}"
          done

      - name: synchronize Modrinth metadata and icon
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_DESCRIPTION: ${{ github.event.repository.description }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew syncModrinthProject syncModrinthIcon

      - name: submit project for review
        env:
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          curl --fail --request PATCH \
            --header "Authorization: ${MODRINTH_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"status":"processing","requested_status":"approved"}' \
            "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}"

      - name: verify project state
        env:
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          curl --fail \
            --header "Authorization: ${MODRINTH_TOKEN}" \
            "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            | jq '{id, slug, status, requested_status, versions}'
